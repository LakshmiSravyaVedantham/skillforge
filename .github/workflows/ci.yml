name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: |
          black --check .
          isort --check-only .
          flake8 src/ tests/ --max-line-length=88 --extend-ignore=E203,W503
      - name: Typecheck
        run: mypy src/skillforge/
      - name: Test
        run: pytest -v --cov=src/skillforge --cov-report=term-missing --cov-fail-under=70
